name: Release DockPorter

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0.0, v1.1.0, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (For React UI)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build React UI
        run: |
          cd ui
          npm install
          npm run build
          cd ..

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Binaries
        run: |
          mkdir -p dist
          # Linux
          GOOS=linux GOARCH=amd64 go build -o dist/dockporter-linux-amd64 ./cmd/agent/main.go
          # macOS Intel
          GOOS=darwin GOARCH=amd64 go build -o dist/dockporter-macos-amd64 ./cmd/agent/main.go
          # macOS Apple Silicon
          GOOS=darwin GOARCH=arm64 go build -o dist/dockporter-macos-arm64 ./cmd/agent/main.go
          # Windows
          GOOS=windows GOARCH=amd64 go build -o dist/dockporter-windows-amd64.exe ./cmd/agent/main.go

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}